<svg fill="none" viewBox="0 0 1200 620" height="620" width="1200" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <linearGradient y2="100%" x2="0%" y1="0%" x1="0%" id="bgGradient">
      <stop stop-color="#0A0F2C" offset="0%"></stop>
      <stop stop-color="#1A233F" offset="100%"></stop>
    </linearGradient>
    
    
    <linearGradient y2="0%" x2="100%" y1="0%" x1="0%" id="tealGradient">
      <stop stop-color="#00E5C8" offset="0%"></stop>
      <stop stop-color="#00B8A0" offset="100%"></stop>
    </linearGradient>
    
    
    <linearGradient gradientUnits="objectBoundingBox" y2="100%" x2="0%" y1="0%" x1="0%" id="roadMaskGradient">
      <stop stop-opacity="0.20" stop-color="#00E5C8" offset="0%"></stop>
      <stop stop-opacity="0.10" stop-color="#00B8A0" offset="100%"></stop>
    </linearGradient>
    
    
    <linearGradient gradientUnits="objectBoundingBox" y2="100%" x2="0%" y1="0%" x1="0%" id="scanGradient">
      <stop stop-opacity="0" stop-color="#00E5C8" offset="0%"></stop>
      <stop stop-opacity="0.85" stop-color="#00E5C8" offset="45%"></stop>
      <stop stop-opacity="0.85" stop-color="#00E5C8" offset="55%"></stop>
      <stop stop-opacity="0" stop-color="#00E5C8" offset="100%"></stop>
    </linearGradient>
    
    
    <filter height="160%" width="160%" y="-30%" x="-30%" id="softGlow">
      <feGaussianBlur result="coloredBlur" stdDeviation="2"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
    
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.88; }
      }
      .title { animation: pulse 4s ease-in-out infinite; }
      
      @keyframes scanMove {
        0% { transform: translateY(-620px); }
        100% { transform: translateY(620px); }
      }
      .scan-line { animation: scanMove 3.4s linear infinite; }
      
      @keyframes carMoveDown1 {
        0% { transform: translateY(-180px); }
        100% { transform: translateY(520px); }
      }
      .car1 { animation: carMoveDown1 4.5s linear infinite; }
      
      @keyframes carMoveDown2 {
        0% { transform: translateY(-240px); }
        100% { transform: translateY(480px); }
      }
      .car2 { animation: carMoveDown2 5.8s linear infinite; }
      
      @keyframes carMoveDown3 {
        0% { transform: translateY(-160px); }
        100% { transform: translateY(550px); }
      }
      .car3 { animation: carMoveDown3 6.8s linear infinite; }
      
      @keyframes maskPulse {
        0%, 100% { opacity: 0.20; }
        50% { opacity: 0.36; }
      }
    </style>
  </defs>

  
