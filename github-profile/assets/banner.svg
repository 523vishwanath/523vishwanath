<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" font-family="'Inter','Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070d"/>
      <stop offset="55%" stop-color="#0a1220"/>
      <stop offset="100%" stop-color="#0e1a2b"/>
    </linearGradient>
    <radialGradient id="halo" cx="78%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#1c3a5e" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0a1220" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="name" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#cfe4ff"/>
      <stop offset="100%" stop-color="#8ab4ff"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="50%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#halo)"/>

  <!-- faint dotted neural texture, upper right -->
  <g opacity="0.28">
    <g fill="#3d5a80">
      <circle cx="905" cy="70" r="2.5"/><circle cx="985" cy="55" r="2.5"/><circle cx="1065" cy="82" r="2.5"/>
      <circle cx="945" cy="130" r="2.5"/><circle cx="1030" cy="120" r="2.5"/><circle cx="1110" cy="140" r="2.5"/>
      <circle cx="905" cy="190" r="2.5"/><circle cx="990" cy="200" r="2.5"/><circle cx="1075" cy="185" r="2.5"/>
    </g>
    <g stroke="#2f4a68" stroke-width="0.8">
      <line x1="905" y1="70" x2="945" y2="130"/><line x1="985" y1="55" x2="945" y2="130"/>
      <line x1="985" y1="55" x2="1030" y2="120"/><line x1="1065" y1="82" x2="1030" y2="120"/>
      <line x1="945" y1="130" x2="905" y2="190"/><line x1="945" y1="130" x2="990" y2="200"/>
      <line x1="1030" y1="120" x2="990" y2="200"/><line x1="1030" y1="120" x2="1075" y2="185"/>
      <line x1="1110" y1="140" x2="1075" y2="185"/>
    </g>
  </g>

  <!-- eyebrow -->
  <text x="72" y="66" fill="#3fb950" font-size="15" font-weight="600" letter-spacing="4">COMPUTER VISION ENGINEER</text>

  <!-- name -->
  <text x="70" y="128" fill="url(#name)" font-size="56" font-weight="800" letter-spacing="0.3">Vishwanath Reddy Ninganolla</text>

  <!-- tagline -->
  <text x="72" y="168" fill="#9fb3c8" font-size="21" font-weight="500">Autonomous Perception · Detection · Segmentation · Tracking</text>

  <rect x="72" y="188" width="560" height="2.5" rx="1.25" fill="url(#rule)"/>

  <!-- keyword chips row 1 -->
  <g font-size="14" font-weight="600">
    <g>
      <rect x="72" y="208" width="150" height="30" rx="15" fill="#0f2033" stroke="#1f4a6f" stroke-width="1"/>
      <text x="147" y="228" fill="#8ab4ff" text-anchor="middle">MSIT · FSU · 3.9 GPA</text>
    </g>
    <g>
      <rect x="234" y="208" width="132" height="30" rx="15" fill="#0f2a1c" stroke="#2f6b3f" stroke-width="1"/>
      <text x="300" y="228" fill="#5fd07a" text-anchor="middle">PyTorch · YOLO</text>
    </g>
    <g>
      <rect x="378" y="208" width="150" height="30" rx="15" fill="#231733" stroke="#5a3f80" stroke-width="1"/>
      <text x="453" y="228" fill="#c4a3ff" text-anchor="middle">TensorRT · ONNX</text>
    </g>
    <g>
      <rect x="540" y="208" width="180" height="30" rx="15" fill="#1a2536" stroke="#3a557a" stroke-width="1"/>
      <text x="630" y="228" fill="#9fb3c8" text-anchor="middle">RF-DETR · SegFormer</text>
    </g>
  </g>

  <!-- keyword chips row 2: deployment / mlops -->
  <g font-size="14" font-weight="600">
    <g>
      <rect x="72" y="248" width="150" height="30" rx="15" fill="#122a28" stroke="#2f6b63" stroke-width="1"/>
      <text x="147" y="268" fill="#5fd0c4" text-anchor="middle">FastAPI · Docker</text>
    </g>
    <g>
      <rect x="234" y="248" width="182" height="30" rx="15" fill="#1a2233" stroke="#3a4f7a" stroke-width="1"/>
      <text x="325" y="268" fill="#8ab4ff" text-anchor="middle">Google Cloud Run</text>
    </g>
    <g>
      <rect x="428" y="248" width="150" height="30" rx="15" fill="#2a2416" stroke="#6b5f2f" stroke-width="1"/>
      <text x="503" y="268" fill="#e0c766" text-anchor="middle">W&amp;B · Comet ML</text>
    </g>
  </g>

  <!-- status line -->
  <circle cx="79" cy="300" r="5" fill="#3fb950" filter="url(#soft)"/>
  <text x="94" y="305" fill="#7d8ea1" font-size="14.5" font-weight="500">Open to Autonomous Driving &amp; Perception roles</text>

  <!-- right-side detection frame accent -->
  <g opacity="0.85" filter="url(#soft)">
    <rect x="946" y="96" width="122" height="128" fill="none" stroke="#58a6ff" stroke-width="2" rx="4"/>
    <rect x="946" y="82" width="66" height="16" fill="#58a6ff" rx="2"/>
    <text x="951" y="94" fill="#05070d" font-size="11" font-weight="700">perception</text>
    <line x1="946" y1="160" x2="1068" y2="160" stroke="#3fb950" stroke-width="1.4" opacity="0.6" stroke-dasharray="4 4"/>
    <line x1="1007" y1="96" x2="1007" y2="224" stroke="#3fb950" stroke-width="1.4" opacity="0.6" stroke-dasharray="4 4"/>
  </g>
</svg>
